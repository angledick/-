stage:
  number: 10
  name: "全生命周期管理"
  description: "贯穿全链路的合规监控与持续管理。涵盖合规六阶段流水线（感知→检查→推荐→告知→交互→处理）、法规全生命周期跟踪（发布→生效→废止）、认证到期预警与续期、跨产品合规洞察、全局数据聚合备份。Agent在此阶段承担综合合规监督者角色，确保全链路的持续合规运行。"
  events:
    - event_code: "compliance:check_started"
    - event_code: "compliance:check_passed"
    - event_code: "compliance:check_failed"
    - event_code: "compliance:regulation_impact"
    - event_code: "compliance:recommendation_generated"
    - event_code: "regulation:updated"
    - event_code: "regulation:new"
    - event_code: "regulation:repealed"
    - event_code: "regulation:cert_requirement_changed"
    - event_code: "regulation:labeling_changed"
    - event_code: "risk:threshold_breached"
    - event_code: "risk:metric_alert"
    - event_code: "risk:cert_expiry_batch"
    - event_code: "risk:regulation_conflict"
    - event_code: "risk:compliance_score_drop"
    - event_code: "certification:expiring"
    - event_code: "certification:expired"
    - event_code: "certification:renewed"
    - event_code: "system:sync_completed"
    - event_code: "system:sync_failed"
    - event_code: "system:knowledge_updated"
    - event_code: "system:backup_completed"
    - event_code: "system:backup_failed"
    - event_code: "system:token_usage_alert"
    - event_code: "system:webhook_received"
    - event_code: "system:rag_index_built"
    - event_code: "user:product_deleted"
    - event_code: "user:worker_configured"
    - event_code: "user:export_data"
    - event_code: "user:cli_command"
