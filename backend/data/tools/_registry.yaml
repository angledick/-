# Tools 注册表
# 定义系统内置工具，用户可在此添加自定义工具定义
# tool_id 必须与 astra_assistant.py 中 _AGENT_TOOL_MCP_REGISTRY 的 key 对齐
# script 字段: 指向 data/tools/impl/ 下的可执行脚本，Agent 可通过 python 命令传参运行
tools:
  - id: tool_compliance_check
    name: "合规检查"
    description: "执行六阶段合规流水线检查"
    tool_type: builtin
    category: compliance
    config:
      pipeline_mode: "6step"
      auto_notify: true
    enabled: true
  - id: tool_hs_lookup
    name: "HS编码查询"
    description: "查询产品HS编码和关税税率"
    tool_type: builtin
    category: compliance
    config:
      data_source: "hs_codes.json"
    enabled: true
  - id: tool_vat_query
    name: "VAT税率查询"
    description: "查询各国VAT税率及IOSS规则"
    tool_type: builtin
    category: compliance
    config:
      data_source: "vat_rates.json"
    enabled: true
  - id: tool_regulation_scan
    name: "法规变更扫描"
    description: "扫描目标市场法规变更"
    tool_type: builtin
    category: compliance
    config:
      scan_interval: "hourly"
      markets: ["EU", "US"]
    enabled: true
  - id: tool_metaso_search
    name: "米塔AI搜索"
    description: "联网搜索实时信息。获取最新新闻、法规更新、市场动态等联网信息"
    tool_type: script
    category: search
    script: "impl/metaso_search.py"
    script_args: ["--query", "{q}", "--count", "{count}"]
    config:
      env_key: "METASO_API_KEY"
    enabled: true

