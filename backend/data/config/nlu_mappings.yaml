# 安全检查 — 注入攻击检测模式（正则）
danger_patterns:
  - "(?i)ignore\\s+(all\\s+)?previous\\s+instructions"
  - "(?i)you\\s+are\\s+now\\s+(a|an)\\s+"
  - "(?i)system\\s*:\\s*you\\s+must"
  - "<script[^>]*>"
  - "(?i)DROP\\s+TABLE"
