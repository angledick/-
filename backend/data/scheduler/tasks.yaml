# ====== 定时任务配置文件 ======
#
# 仅保留三项核心定时任务：
#   1. 风险情报检索（每小时）
#   2. 心跳自检（每5分钟）
#   3. Shopify 商品同步（每20分钟，检测缺失商品并推送）
#
# ==================================
tasks:
  - task_name: scan_regulation_changes
    display_name: "风险情报检索"
    description: "每小时扫描目标市场法规变更并推送预警"
    agent_instructions: "此任务执行高频法规与风险情报扫描。使用 regulation-scan skill 联网搜索各目标市场（EU/US/UK/JP/KR）过去7天的法规公告、贸易政策变更、关税调整。输出结构化变更列表，对 high/critical 级别的变更立即触发 impact-analysis 并推送飞书预警。"
    default_trigger: interval
    trigger_args:
      hours: 1
    default_worker: regulation_worker
  - task_name: heartbeat_check
    display_name: "心跳自检"
    description: "每5分钟检查系统各组件健康状态"
    agent_instructions: "此任务执行系统健康检查。检查项：1) FastAPI应用API端点可达性 2) ChromaDB向量库连接状态 3) SQLite数据库读写 4) Worker注册表状态 5) Scheduler定时器运行状态。输出健康检查报告，异常项提升为预警事件。"
    default_trigger: interval
    trigger_args:
      minutes: 5
    default_worker: system_worker
  - task_name: shopify_product_sync
    display_name: "Shopify 商品同步"
    description: "每20分钟同步 Shopify 商品到本地，检测缺失商品并推送通知"
    agent_instructions: "此任务同步 Shopify 店铺商品到本地产品库。执行流程：1) 调用 Shopify Admin API 获取最新商品列表 2) 与本地产品库对比 3) 新增商品自动创建产品记录 4) 识别 Shopify 有但本地缺失的商品并推送飞书通知 5) 更新已有商品的库存和价格信息。"
    default_trigger: interval
    trigger_args:
      minutes: 20
    default_worker: listing_worker
