# 事件动作推荐映射
# 事件类别 → 推荐动作列表（skill / cli / api）
event_actions:
  lifecycle:
    - type: skill
      name: shopify-custom-data
      action: "更新产品元字段"
    - type: cli
      name: "shopify store execute"
      action: "执行店铺操作"
    - type: api
      name: "PUT /products/:id/lifecycle"
      action: "更新生命周期状态"
  compliance:
    - type: skill
      name: shopify-admin
      action: "执行合规检查"
    - type: cli
      name: "shopify store execute query"
      action: "查询店铺"
    - type: api
      name: "POST /compliance/checks"
      action: "执行合规检查"
  certification:
    - type: skill
      name: shopify-custom-data
      action: "管理认证到期"
    - type: cli
      name: "shopify store execute"
      action: "执行店铺操作"
    - type: api
      name: "PUT /products/:id/certifications"
      action: "更新认证"
  order:
    - type: skill
      name: shopify-customer
      action: "订单合规审核"
    - type: cli
      name: "shopify store execute"
      action: "执行店铺操作"
    - type: api
      name: "GET /products/:id/events"
      action: "查看产品事件"
  regulation:
    - type: skill
      name: web-search
      action: "查询新法规原文"
    - type: cli
      name: "summarize URL"
      action: "摘要法规 URL"
    - type: api
      name: "POST /rag/reload"
      action: "重新加载知识库"
  risk_alert:
    - type: skill
      name: skill-vetter
      action: "风险扫描"
    - type: cli
      name: "shopify store execute"
      action: "执行店铺操作"
    - type: api
      name: "POST /risk/alerts"
      action: "提交风险预警"
  system:
    - type: skill
      name: summarize
      action: "生成系统报告"
    - type: cli
      name: "shopify store execute"
      action: "执行店铺操作"
    - type: api
      name: "GET /config/health"
      action: "健康检查"
  user_action:
    - type: skill
      name: brandkit
      action: "生成审计报表"
    - type: cli
      name: "-"
      action: "-"
    - type: api
      name: "GET /events"
      action: "查询审计日志"
