# 模型路由配置
# 定义不同角色使用的 AI 模型和 Provider
routes:
  default:
    provider: anthropic
    model: claude-sonnet-4-20250514
    api_key_env: ANTHROPIC_API_KEY
    base_url: ""
    max_tokens: 4096
    temperature: 0.7
    top_p: 0.9
  chat:
    provider: anthropic
    model: claude-sonnet-4-20250514
    api_key_env: ANTHROPIC_API_KEY
    base_url: ""
    max_tokens: 4096
    temperature: 0.7
    top_p: 0.9
  compliance:
    provider: anthropic
    model: claude-sonnet-4-20250514
    api_key_env: ANTHROPIC_API_KEY
    base_url: ""
    max_tokens: 8192
    temperature: 0.3
    top_p: 0.9
  summary:
    provider: anthropic
    model: claude-haiku-3-5-20241022
    api_key_env: ANTHROPIC_API_KEY
    base_url: ""
    max_tokens: 2048
    temperature: 0.5
    top_p: 0.9
  risk_analysis:
    provider: zhipu
    model: glm-5.1
    api_key_env: ZHIPUAI_API_KEY
    base_url: "https://open.bigmodel.cn/api/coding/paas/v4"
    max_tokens: 2000
    temperature: 0.1
    top_p: 0.9
  lifecycle_analysis:
    provider: zhipu
    model: glm-5.1
    api_key_env: ZHIPUAI_API_KEY
    base_url: "https://open.bigmodel.cn/api/coding/paas/v4"
    max_tokens: 2000
    temperature: 0.1
    top_p: 0.9
  dispatch:
    provider: zhipu
    model: glm-5.1
    api_key_env: ZHIPUAI_API_KEY
    base_url: "https://open.bigmodel.cn/api/coding/paas/v4"
    max_tokens: 1500
    temperature: 0.05
    top_p: 0.9
